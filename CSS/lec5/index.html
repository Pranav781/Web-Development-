<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 1px
            solid black;
            width: 200px;
            height: 200px;
            outline: 5px dashed red;
                outline-offset: 5px;
        }
        .text {
            color: red;
            text-shadow: 2px 2px 5px blue;
        }
        </style>
</head>
<body>
    <div class="box">
        I am the box
    </div>
    <p class="text">I am the text</p>
</body>
</html>
